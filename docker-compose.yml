services:
  caddy:
    image: caddy:2.8-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-localhost}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-infra@example.com}
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      target: worker-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3100
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liveu_secure_file_transfer}
      POSTGRES_USER: ${POSTGRES_USER:-liveu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liveu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liveu} -d ${POSTGRES_DB:-liveu_secure_file_transfer}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        sleep 2;
      done &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set none local/$$S3_BUCKET
      "
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.18
    ports:
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8025/api/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: web-dev
    profiles: ["ops"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    command: ["npm", "run", "db:push"]

  seed:
    build:
      context: .
      target: web-dev
    profiles: ["ops"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    command: ["npm", "run", "db:seed"]

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
  web_node_modules:
  web_next:
